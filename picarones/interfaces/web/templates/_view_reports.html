{# Vue Rapports — liste des HTML deja generes dans le dossier. #}
<section id="view-reports" class="view view-enter">

  <div class="view-hero">
    <div class="view-hero-title">
      <div class="view-hero-eyebrow">VIEW · REPORTS</div>
      <div class="view-hero-name" data-i18n="reports_title">Rapports générés</div>
      <div class="view-hero-desc" data-i18n="reports_hero_desc">Rapports HTML produits par les benchmarks — tri par date.</div>
    </div>
    <div class="view-hero-stats">
      <div class="hero-stat"><span class="v num" id="reports-count">—</span><span class="k">REPORTS</span></div>
    </div>
  </div>

  <div class="sec" data-tone="slate">
    <div class="sec-head">
      <span class="sec-num">01</span>
      <div style="flex:1; display:flex; flex-direction:column;">
        <div class="sec-title" data-i18n="reports_title">Rapports</div>
        <div class="sec-sub" data-i18n="reports_dir_label">Dossier de rapports</div>
      </div>
      <div class="sec-aside" id="reports-aside"></div>
    </div>
    <div class="sec-body">
      <div class="row" style="margin-bottom:14px; gap:8px;">
        <div class="field" style="flex:1; max-width:420px;">
          <input type="text" id="reports-dir" value="." class="mono-input" />
        </div>
        <button class="btn" type="button" onclick="loadReports()">
          <span data-i18n="reports_refresh">Rafraîchir</span>
        </button>
      </div>
      <div id="reports-list">
        <div class="empty" data-i18n="loading">Chargement…</div>
      </div>
    </div>
  </div>

</section>
